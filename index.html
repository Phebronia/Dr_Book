<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مكتبة النور — كتالوج الكتب</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">

<script>
/* ============================================================
   ⚙️ CONFIG — عدّلي هنا بس لكل عميل جديد
   ============================================================ */
const CONFIG = {
  storeName:   "Dr. Book",
  tagline:     "نبض الكتب",
  whatsapp:    "201272184167",        // رقم واتساب المكتبة بكود الدولة من غير +
  currency:    "ج.م",

  // لوجو المكتبة (صورة PNG) — سيبيه فاضي "" لو مفيش لوجو
  logoUrl:     "",

  // لينكات السوشيال — سيبي أي واحد فاضي "" لو مش موجود وهيختفي لوحده
  instagram:   "https://www.instagram.com/drbook2024",
  facebook:    "https://www.facebook.com/share/1J1UbvHame/",
  tiktok:      "https://www.tiktok.com/@drbook",

  // لينك الشيت عن طريق opensheet (مجاني):
  // https://opensheet.elk.sh/SHEET_ID/Sheet1
  // سيبيه فاضي "" عشان تشتغل البيانات التجريبية
  sheetUrl:    "https://opensheet.elk.sh/1RVwxubBw54JZOBeAZ2AmRLA4UfrhyTG7njG3-QkFXcU/Sheet1",

  // أعمدة الشيت المتوقعة:
  // "الاسم" | "المؤلف" | "السعر" | "الصورة" | "قبل الخصم" | "الحالة"
  // - "قبل الخصم": اكتب فيه السعر القديم لو في خصم (والسعر الجديد في عمود السعر)
  // - "الحالة": اكتب "نفد" لو الكتاب خلص — هيظهر "نفدت الكمية"
  // (بيقبل كمان: name | author | price | image | oldPrice | status)
};
/* ============================================================ */
</script>

<style>
:root{
  --ink:      #1C2333;
  --paper:    #F6F8FC;
  --card:     #FFFFFF;
  --green:    #14213D;   /* الكحلي الأساسي */
  --green-2:  #23345C;   /* كحلي أفتح للتدرج */
  --brass:    #C9A24B;   /* الدهبي */
  --brass-2:  #A8842F;
  --line:     #E2E6EF;
}

*{ margin:0; padding:0; box-sizing:border-box; }
html{ scroll-behavior:smooth; }
body{
  font-family:'IBM Plex Sans Arabic', sans-serif;
  background:var(--paper);
  color:var(--ink);
  min-height:100vh;
}

/* ---------- الهيدر ---------- */
header{
  background:linear-gradient(160deg, var(--green) 0%, var(--green-2) 100%);
  color:#F4F0E4;
  border-bottom:3px solid var(--brass);
  padding:2.2rem 1.2rem 4.6rem;
  text-align:center;
  position:relative;
}
header::after{
  content:"";
  position:absolute; inset-inline:0; bottom:-1px; height:26px;
  background:var(--paper);
  clip-path:polygon(0 100%, 100% 100%, 100% 0, 0 60%);
}
.store-name{
  font-family:'Amiri', serif;
  font-weight:700;
  font-size:clamp(2rem, 6vw, 2.9rem);
  letter-spacing:.5px;
}
.logo-plate{
  display:inline-block;
  background:#fff;
  border-radius:16px;
  padding:.8rem 1.6rem;
  margin-bottom:1rem;
  box-shadow:0 6px 18px rgba(0,0,0,.25);
}
.logo-plate img{
  display:block;
  max-width:min(260px, 70vw);
  max-height:110px;
  object-fit:contain;
}
.tagline{
  margin-top:.35rem;
  font-size:.95rem;
  color:var(--brass);
  font-weight:500;
}

/* ---------- السيرش ---------- */
.search-wrap{
  max-width:640px;
  margin:-2.6rem auto 0;
  padding:0 1.2rem;
  position:relative;
  z-index:2;
}
.search-box{
  display:flex; align-items:center; gap:.6rem;
  background:var(--card);
  border:1.5px solid var(--line);
  border-radius:14px;
  padding:.85rem 1.1rem;
  box-shadow:0 8px 22px rgba(30,58,52,.14);
}
.search-box svg{ flex-shrink:0; opacity:.55; }
.search-box input{
  border:none; outline:none; background:transparent;
  font-family:inherit; font-size:1.05rem; width:100%;
  color:var(--ink);
}
.search-box input::placeholder{ color:#9A937F; }
.result-count{
  text-align:center; margin-top:.7rem;
  font-size:.85rem; color:#7C7663;
  min-height:1.2em;
}

/* ---------- الشبكة ---------- */
.grid{
  max-width:1100px;
  margin:1.6rem auto 3rem;
  padding:0 1.2rem;
  display:grid;
  grid-template-columns:repeat(2, 1fr);
  gap:1.1rem;
}
@media (min-width:700px){
  .grid{ grid-template-columns:repeat(4, 1fr); gap:1.3rem; }
}
@media (min-width:1100px){
  .grid{ grid-template-columns:repeat(5, 1fr); gap:1.4rem; }
}

/* ---------- كارت الكتاب ---------- */
.book{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:14px;
  overflow:hidden;
  display:flex; flex-direction:column;
  transition:transform .18s ease, box-shadow .18s ease;
}
@media (hover:hover){
  .book:hover{ transform:translateY(-4px); box-shadow:0 12px 24px rgba(30,58,52,.12); }
}
.cover{
  position:relative;
  aspect-ratio:3/4;
  background:linear-gradient(160deg, var(--green) 0%, var(--green-2) 100%);
  overflow:hidden;
  border-radius:14px 14px 0 0;
}
.cover img{
  width:100%; height:100%; object-fit:cover; display:block;
}
.cover .fallback{
  position:absolute; inset:0;
  display:flex; align-items:center; justify-content:center;
  padding:1rem;
  text-align:center;
  color:#F4EBD3;
  font-family:'Amiri', serif;
  font-size:1.1rem;
  font-weight:700;
  line-height:1.7;
}
.cover .fallback::before{
  content:"";
  position:absolute; inset:10px;
  border:1px solid rgba(201,162,75,.5);
  border-radius:8px;
}

/* استيكر السعر — زي تكت السعر اللي بيتلزق على الكتاب */
.price-tag{
  position:absolute;
  bottom:8px; inset-inline-start:8px;
  background:var(--brass);
  color:#fff;
  font-weight:700;
  font-size:.9rem;
  padding:.35rem .7rem;
  border-radius:999px;
  transform:rotate(-4deg);
  box-shadow:0 3px 8px rgba(0,0,0,.25);
}
.old-price{
  font-size:.72rem;
  font-weight:500;
  opacity:.8;
  margin-inline-end:.15rem;
}

/* شريط الخصم / نفدت الكمية — فوق الغلاف */
.ribbon{
  position:absolute;
  top:10px; inset-inline-end:-32px;
  transform:rotate(45deg);
  width:120px;
  text-align:center;
  font-size:.72rem;
  font-weight:700;
  padding:.28rem 0;
  color:#fff;
  box-shadow:0 2px 6px rgba(0,0,0,.25);
  z-index:2;
}
[dir="rtl"] .ribbon{ transform:rotate(-45deg); }
.sale-ribbon{ background:#C0392B; }
.soldout-ribbon{ background:#5A6272; }

/* حالة نفدت الكمية — الكارت كله بيهدى */
.book.soldout .cover img{ filter:grayscale(1); opacity:.55; }
.book.soldout .cover .fallback{ opacity:.5; }
.book.soldout .title, .book.soldout .author{ opacity:.55; }
.order-btn.disabled{
  border-color:#C4C9D6;
  color:#9AA1B3;
  cursor:default;
  pointer-events:none;
}

.info{
  padding:.8rem .85rem 1rem;
  display:flex; flex-direction:column; gap:.55rem; flex:1;
}
.title{
  font-weight:600;
  font-size:.95rem;
  line-height:1.5;
}
.author{
  font-size:.8rem;
  color:#7A8299;
  font-weight:500;
  flex:1;
}
.order-btn{
  display:flex; align-items:center; justify-content:center; gap:.35rem;
  background:transparent;
  border:1.5px solid var(--green);
  color:var(--green);
  border-radius:10px;
  padding:.5rem .3rem;
  font-family:inherit;
  font-weight:600;
  font-size:.8rem;
  white-space:nowrap;
  cursor:pointer;
  text-decoration:none;
  transition:background .15s ease, color .15s ease;
}
.order-btn svg{ flex-shrink:0; width:14px; height:14px; }
@media (max-width:380px){
  .order-btn{ font-size:.72rem; gap:.25rem; }
}
.order-btn:hover, .order-btn:focus-visible{
  background:var(--green); color:#fff;
}
.order-btn:focus-visible{ outline:2px solid var(--brass); outline-offset:2px; }

/* ---------- الحالات ---------- */
.state{
  grid-column:1/-1;
  text-align:center;
  padding:3rem 1rem;
  color:#7C7663;
}
.state .big{ font-family:'Amiri', serif; font-size:1.5rem; color:var(--green); margin-bottom:.4rem; }

/* ---------- الفوتر ---------- */
footer{
  background:var(--green);
  color:var(--brass);
  border-top:3px solid var(--brass);
  text-align:center;
  padding:2rem 1rem 1.6rem;
  font-size:.85rem;
}
.footer-cta{
  font-family:'Amiri', serif;
  font-size:1.25rem;
  color:#F4EBD3;
  margin-bottom:1rem;
}
.footer-name{
  margin-top:1.2rem;
  font-size:.78rem;
  color:#8E97AC;
}

.social{
  display:flex; justify-content:center; gap:.9rem;
}
.social:empty{ display:none; }
.social a{
  display:flex; align-items:center; justify-content:center;
  width:46px; height:46px;
  border-radius:50%;
  border:1.5px solid var(--brass);
  color:#F4EBD3;
  transition:background .15s ease, color .15s ease, transform .15s ease;
}
.social a:hover{
  background:var(--brass);
  color:var(--green);
  transform:translateY(-3px);
}
.social svg{ width:22px; height:22px; }

@media (prefers-reduced-motion:reduce){
  *{ transition:none !important; }
  html{ scroll-behavior:auto; }
}
</style>
</head>
<body>

<header>
  <div class="logo-plate" id="logoPlate" hidden>
    <img id="logoImg" src="" alt="لوجو المكتبة">
  </div>
  <h1 class="store-name" id="storeName"></h1>
  <p class="tagline" id="tagline"></p>
</header>

<div class="search-wrap">
  <div class="search-box">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/>
    </svg>
    <input type="search" id="searchInput" placeholder="ابحث عن كتاب بالاسم…" autocomplete="off">
  </div>
  <p class="result-count" id="resultCount"></p>
</div>

<main class="grid" id="grid">
  <div class="state"><div class="big">جاري تحميل الكتب…</div></div>
</main>

<footer>
  <p class="footer-cta">للطلب والاستفسار واتساب</p>
  <div class="social" id="socialRow"></div>
  <p class="footer-name"><span id="footerName"></span> © 2026</p>
</footer>

<script>
/* ---------- بيانات تجريبية (بتشتغل لو sheetUrl فاضي) ---------- */
const DEMO_BOOKS = [
  { name:"عزازيل",              author:"يوسف زيدان",        price:180, image:"" },
  { name:"ثلاثية غرناطة",       author:"رضوى عاشور",        price:199, oldPrice:250, image:"" },
  { name:"أرض زيكولا",          author:"عمرو عبد الحميد",   price:160, image:"", status:"نفد" },
  { name:"الفيل الأزرق",        author:"أحمد مراد",         price:190, image:"" },
  { name:"رحلة ابن فطومة",      author:"نجيب محفوظ",        price:120, image:"" },
  { name:"في قلبي أنثى عبرية",  author:"خولة حمدي",         price:135, oldPrice:170, image:"" },
  { name:"شيفرة بلال",          author:"أحمد خيري العمري",  price:150, image:"" },
  { name:"واحة الغروب",         author:"بهاء طاهر",         price:140, image:"" },
];

let BOOKS = [];

/* تطبيع النص العربي عشان السيرش يلاقي "احمد" و"أحمد" */
function normalizeAr(s){
  return (s || "")
    .toString()
    .replace(/[أإآا]/g, "ا")
    .replace(/ى/g, "ي")
    .replace(/ة/g, "ه")
    .replace(/[\u064B-\u0652]/g, "")   // التشكيل
    .replace(/\s+/g, " ")
    .trim()
    .toLowerCase();
}

/* تحويل لينكات جوجل درايف لصيغة قابلة للعرض تلقائيًا */
function fixImageUrl(url){
  if(!url) return "";
  const m = url.match(/drive\.google\.com\/(?:file\/d\/|open\?id=|uc\?.*id=)([\w-]+)/);
  if(m) return "https://drive.google.com/thumbnail?id=" + m[1] + "&sz=w600";
  return url;
}

function waLink(bookName){
  const msg = encodeURIComponent("مرحبًا، عايز أطلب كتاب: " + bookName);
  return "https://wa.me/" + CONFIG.whatsapp + "?text=" + msg;
}

/* الحالة بتقبل أي صيغة فيها معنى النفاد: نفد، نفذ، خلص، خلصت، مش متوفر، غير متاح، sold out... */
function isSoldOut(b){
  const s = normalizeAr(b.status || "");
  if(!s) return false;
  const keywords = ["نفد", "نفذ", "خلص", "متوفر", "متاح", "sold", "out", "منتهي", "انتهي"];
  return s === "0" || keywords.some(k => s.includes(k));
}

function render(list){
  const grid = document.getElementById("grid");
  const count = document.getElementById("resultCount");

  if(!list.length){
    grid.innerHTML = '<div class="state"><div class="big">مفيش نتائج</div><div>جرّب اسم تاني أو جزء من الاسم</div></div>';
    count.textContent = "";
    return;
  }

  count.textContent = list.length + (list.length === 1 ? " كتاب" : " كتاب متاح");

  grid.innerHTML = list.map(b => {
    const img = fixImageUrl(b.image);
    const soldOut = isSoldOut(b);
    const hasSale = !soldOut && b.oldPrice && Number(b.oldPrice) > Number(b.price);
    const salePct = hasSale ? Math.round((1 - Number(b.price)/Number(b.oldPrice)) * 100) : 0;

    const coverInner = img
      ? '<img src="' + img + '" alt="غلاف ' + b.name + '" loading="lazy" ' +
        'onerror="this.style.display=\'none\'; this.nextElementSibling.style.display=\'flex\'">' +
        '<div class="fallback" style="display:none">' + b.name + '</div>'
      : '<div class="fallback">' + b.name + '</div>';
    // لو في صورة: الاسم مستخبي خالص ومش بيظهر غير لو الصورة فشلت في التحميل

    const priceHtml = soldOut
      ? ''
      : '<span class="price-tag">' +
          (hasSale ? '<s class="old-price">' + b.oldPrice + '</s> ' : '') +
          b.price + " " + CONFIG.currency +
        '</span>';

    const badge = soldOut
      ? '<span class="ribbon soldout-ribbon">نفدت الكمية</span>'
      : (hasSale ? '<span class="ribbon sale-ribbon">خصم ' + salePct + '%</span>' : '');

    const btnHtml = soldOut
      ? '<span class="order-btn disabled" aria-disabled="true">غير متوفر حاليًا</span>'
      : '<a class="order-btn" href="' + waLink(b.name) + '" target="_blank" rel="noopener">' +
          '<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2a10 10 0 0 0-8.6 15.1L2 22l5-1.3A10 10 0 1 0 12 2Zm5.5 14.1c-.2.7-1.3 1.3-1.8 1.3-.5.1-1 .2-3.3-.7-2.8-1.1-4.6-4-4.7-4.2-.1-.2-1.1-1.5-1.1-2.9s.7-2 1-2.3c.2-.3.5-.3.7-.3h.5c.2 0 .4 0 .6.5s.8 1.9.8 2c.1.1.1.3 0 .5l-.4.6c-.1.2-.3.4-.1.7.2.3.8 1.3 1.7 2.1 1.2 1.1 2.2 1.4 2.5 1.5.3.1.5.1.7-.1l.9-1c.2-.3.4-.2.7-.1l2 1c.3.1.5.2.5.3.1.1.1.7-.2 1.1Z"/></svg>' +
          'اطلب واتساب' +
        '</a>';

    return (
      '<article class="book' + (soldOut ? ' soldout' : '') + '">' +
        '<div class="cover">' + coverInner + badge + priceHtml + '</div>' +
        '<div class="info">' +
          '<h2 class="title">' + b.name + '</h2>' +
          (b.author ? '<p class="author">' + b.author + '</p>' : '') +
          btnHtml +
        '</div>' +
      '</article>'
    );
  }).join("");
}

function applySearch(){
  const q = normalizeAr(document.getElementById("searchInput").value);
  if(!q){ render(BOOKS); return; }
  render(BOOKS.filter(b => normalizeAr(b.name + " " + (b.author || "")).includes(q)));
}

/* قراءة الداتا: من الشيت لو موجود، وإلا التجريبية */
async function loadBooks(){
  if(CONFIG.sheetUrl){
    try{
      const res = await fetch(CONFIG.sheetUrl);
      const rows = await res.json();
      BOOKS = rows.map(r => ({
        name:     r["الاسم"] || r["اسم الكتاب"] || r.name || "",
        author:   r["المؤلف"] || r["الكاتب"] || r.author || "",
        price:    r["السعر"] || r.price || "",
        image:    r["الصورة"] || r.image || "",
        oldPrice: r["قبل الخصم"] || r["السعر القديم"] || r.oldPrice || "",
        status:   r["الحالة"] || r.status || "",
      })).filter(b => b.name);
      if(!BOOKS.length) throw new Error("empty");
    }catch(e){
      BOOKS = DEMO_BOOKS;
    }
  }else{
    BOOKS = DEMO_BOOKS;
  }
  render(BOOKS);
}

/* ---------- تشغيل ---------- */
document.getElementById("storeName").textContent  = CONFIG.storeName;
document.getElementById("tagline").textContent    = CONFIG.tagline;

/* أيقونات السوشيال — الواتساب دايمًا ظاهر، والباقي اللي لينكه فاضي أو سايب USERNAME بيتشال لوحده */
const SOCIAL_ICONS = {
  whatsapp:  '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2a10 10 0 0 0-8.6 15.1L2 22l5-1.3A10 10 0 1 0 12 2Zm5.5 14.1c-.2.7-1.3 1.3-1.8 1.3-.5.1-1 .2-3.3-.7-2.8-1.1-4.6-4-4.7-4.2-.1-.2-1.1-1.5-1.1-2.9s.7-2 1-2.3c.2-.3.5-.3.7-.3h.5c.2 0 .4 0 .6.5s.8 1.9.8 2c.1.1.1.3 0 .5l-.4.6c-.1.2-.3.4-.1.7.2.3.8 1.3 1.7 2.1 1.2 1.1 2.2 1.4 2.5 1.5.3.1.5.1.7-.1l.9-1c.2-.3.4-.2.7-.1l2 1c.3.1.5.2.5.3.1.1.1.7-.2 1.1Z"/></svg>',
  facebook:  '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M14 8h3V5h-3c-2.2 0-4 1.8-4 4v2H7v3h3v7h3v-7h3l1-3h-4V9c0-.6.4-1 1-1Z"/></svg>',
  instagram: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/></svg>',
  tiktok:    '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M16.6 3c.4 2 1.8 3.6 3.9 3.9v3c-1.5 0-2.9-.5-3.9-1.3v6.9c0 3.5-2.8 6-6.1 6-3.2 0-5.5-2.4-5.5-5.4 0-3.1 2.5-5.5 5.8-5.5.3 0 .7 0 1 .1v3.1c-.3-.1-.6-.2-1-.2-1.5 0-2.7 1.1-2.7 2.5 0 1.3 1 2.4 2.5 2.4 1.6 0 2.9-1.3 2.9-3.2V3h3.1Z"/></svg>',
};
const SOCIAL_LINKS = {
  whatsapp:  "https://wa.me/" + CONFIG.whatsapp,
  facebook:  CONFIG.facebook,
  instagram: CONFIG.instagram,
  tiktok:    CONFIG.tiktok,
};
const socialRow = document.getElementById("socialRow");
["whatsapp","facebook","instagram","tiktok"].forEach(key => {
  const url = (SOCIAL_LINKS[key] || "").trim();
  if(!url || /USERNAME|PAGE/i.test(url)) return;
  const a = document.createElement("a");
  a.href = url;
  a.target = "_blank";
  a.rel = "noopener";
  a.setAttribute("aria-label", key);
  a.innerHTML = SOCIAL_ICONS[key];
  socialRow.appendChild(a);
});
if(CONFIG.logoUrl){
  document.getElementById("logoImg").src = CONFIG.logoUrl;
  document.getElementById("logoPlate").hidden = false;
}
document.getElementById("footerName").textContent = CONFIG.storeName;
document.title = CONFIG.storeName + " — كتالوج الكتب";

document.getElementById("searchInput").addEventListener("input", applySearch);
loadBooks();
</script>
</body>
</html>
